<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CiT 사진 배경 통일 도구</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F4F5F7; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .bg-preview { height: 36px; border-radius: 8px; border: 1px solid #E5E7EB; background: linear-gradient(to right, #E6E9EE, #E3E6EB, #E0E3E8); margin-bottom: 6px; }
  .hex-row { display: flex; gap: 6px; align-items: center; }
  .hex { font-family: monospace; font-size: 11px; background: #F4F5F7; padding: 2px 8px; border-radius: 6px; color: #555; }
  .drop-zone { border: 2px dashed #D1D5DB; border-radius: 10px; padding: 2rem; text-align: center; cursor: pointer; background: #FAFAFA; transition: all 0.15s; }
  .drop-zone:hover, .drop-zone.over { border-color: #9CA3AF; background: #F3F4F6; }
  .drop-zone p { font-size: 14px; color: #555; }
  .drop-zone small { font-size: 12px; color: #9CA3AF; }
  .thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 12px; }
  .thumb { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #E5E7EB; }
  .thumb img { width: 100%; height: 80px; object-fit: cover; display: block; }
  .thumb .rm { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; line-height: 20px; text-align: center; }
  .thumb .fn { font-size: 10px; color: #888; padding: 3px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #fff; }
  .opts { display: flex; gap: 12px; flex-wrap: wrap; }
  .opt { flex: 1; min-width: 130px; }
  .opt label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
  select { width: 100%; border: 1px solid #D1D5DB; border-radius: 8px; padding: 7px 10px; font-size: 13px; background: #fff; color: #1a1a1a; height: 36px; }
  .srow { display: flex; align-items: center; gap: 8px; }
  .srow input[type=range] { flex: 1; accent-color: #1a1a1a; }
  .sv { font-size: 13px; font-weight: 600; min-width: 40px; }
  .btn-row { display: flex; gap: 10px; margin-top: 1rem; }
  .btn-pri { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 500; cursor: pointer; flex: 1; }
  .btn-pri:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-sec { background: #fff; border: 1px solid #D1D5DB; border-radius: 8px; padding: 10px 16px; font-size: 14px; cursor: pointer; color: #1a1a1a; }
  .btn-sec:hover { background: #F4F5F7; }
  .prog-wrap { height: 4px; background: #E5E7EB; border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
  .prog-bar { height: 100%; background: #1a1a1a; width: 0%; transition: width 0.3s; border-radius: 2px; }
  .status { font-size: 12px; color: #888; margin-top: 6px; min-height: 16px; }
  .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 12px; }
  .res-item { border: 1px solid #E5E7EB; border-radius: 10px; overflow: hidden; }
  .res-item img { width: 100%; height: 140px; object-fit: cover; display: block; }
  .res-item .dl-btn { display: block; font-size: 13px; padding: 9px 10px; background: #1a1a1a; color: #fff; text-decoration: none; text-align: center; cursor: pointer; border: none; width: 100%; font-family: inherit; font-weight: 500; }
  .res-item .dl-btn:hover { background: #333; }
  .res-err { font-size: 11px; padding: 6px 8px; color: #DC2626; text-align: center; background: #FEF2F2; border-top: 1px solid #FECACA; }
  .steps { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .step { font-size: 12px; background: #F3F4F6; border-radius: 6px; padding: 4px 10px; color: #555; }
  .step b { color: #1a1a1a; }
  .quality-info { font-size: 11px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>CiT 사진 배경 통일 도구</h1>
  <p class="subtitle">누끼 제거 → 스튜디오 배경 합성 → 고해상도 저장</p>

  <div class="steps">
    <div class="step"><b>①</b> 사진 업로드</div>
    <div class="step"><b>②</b> 누끼 제거</div>
    <div class="step"><b>③</b> 배경 합성</div>
    <div class="step"><b>④</b> 고해상도 저장</div>
  </div>

  <div class="card">
    <div class="card-title">합성 배경 (참고 사진과 동일)</div>
    <div class="bg-preview"></div>
    <div class="hex-row">
      <span class="hex">#E6E9EE</span>
      <span style="font-size:12px;color:#aaa;">→</span>
      <span class="hex">#E0E3E8</span>
      <span style="font-size:12px;color:#aaa;margin-left:4px;">쿨 블루-그레이 스튜디오</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">사진 업로드</div>
    <div class="drop-zone" id="dropZone">
      <div style="font-size:28px;margin-bottom:8px;">🖼</div>
      <p>클릭하거나 파일을 드래그하세요</p>
      <small>JPG · PNG · WEBP · 복수 선택 가능</small>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    <div class="thumb-grid" id="thumbGrid"></div>
  </div>

  <div class="card">
    <div class="card-title">출력 옵션</div>
    <div class="opts">
      <div class="opt">
        <label>배경 스타일</label>
        <select id="bgStyle">
          <option value="studio">스튜디오 그라디언트 (참고와 동일)</option>
          <option value="flat">단색 플랫</option>
          <option value="radial">방사형 (중앙 밝게)</option>
        </select>
      </div>
      <div class="opt">
        <label>출력 해상도</label>
        <select id="outputSize">
          <option value="original">원본 크기 유지</option>
          <option value="2k">2K (2048px 장변)</option>
          <option value="4k" selected>4K (3840px 장변) — 권장</option>
          <option value="print">인쇄용 (5000px 장변)</option>
        </select>
      </div>
    </div>
    <div class="opts" style="margin-top:12px;">
      <div class="opt">
        <label>JPEG 품질</label>
        <div class="srow">
          <input type="range" id="qualSlider" min="85" max="100" step="1" value="98">
          <span class="sv" id="qualVal">98</span>
        </div>
        <div class="quality-info" id="qualInfo">거의 무손실 — 파일 크기 약 2~4MB</div>
      </div>
      <div class="opt">
        <label>업샘플링 방식</label>
        <select id="upMethod">
          <option value="lanczos">고품질 (다단계 업스케일)</option>
          <option value="standard">표준</option>
        </select>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-pri" id="runBtn" disabled>누끼 + 배경 합성 + 고해상도 처리 시작</button>
    <button class="btn-sec" id="clearBtn">초기화</button>
  </div>
  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <p class="status" id="statusMsg"></p>

  <div id="resultSection" style="display:none; margin-top:1.5rem;">
    <div class="card">
      <div class="card-title" id="resultTitle">처리 결과</div>
      <div class="result-grid" id="resultGrid"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const BG_LIGHT = '#E6E9EE', BG_MID = '#E3E6EB', BG_DARK = '#E0E3E8';
let files = [], results = [];

const dz = $('dropZone');
dz.addEventListener('click', () => $('fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); addFiles(e.dataTransfer.files); });
$('fileInput').addEventListener('change', () => addFiles($('fileInput').files));

$('qualSlider').addEventListener('input', () => {
  const q = parseInt($('qualSlider').value);
  $('qualVal').textContent = q;
  if (q >= 98) $('qualInfo').textContent = '거의 무손실 — 파일 크기 약 2~4MB';
  else if (q >= 92) $('qualInfo').textContent = '고품질 — 파일 크기 약 1~2MB';
  else $('qualInfo').textContent = '표준 품질 — 파일 크기 약 500KB~1MB';
});

function addFiles(newFiles) {
  Array.from(newFiles).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    files.push(f);
    const idx = files.length - 1;
    const reader = new FileReader();
    reader.onload = e => {
      const item = document.createElement('div');
      item.className = 'thumb';
      item.innerHTML = `<img src="${e.target.result}"><button class="rm" data-idx="${idx}">×</button><div class="fn">${f.name}</div>`;
      $('thumbGrid').appendChild(item);
    };
    reader.readAsDataURL(f);
  });
  $('runBtn').disabled = false;
}

$('thumbGrid').addEventListener('click', e => {
  if (e.target.classList.contains('rm')) {
    files[+e.target.dataset.idx] = null;
    e.target.closest('.thumb').remove();
    $('runBtn').disabled = files.filter(Boolean).length === 0;
  }
});

$('clearBtn').addEventListener('click', () => {
  files = []; results = [];
  $('thumbGrid').innerHTML = ''; $('resultGrid').innerHTML = '';
  $('resultSection').style.display = 'none';
  $('progWrap').style.display = 'none';
  $('statusMsg').textContent = '';
  $('fileInput').value = '';
  $('runBtn').disabled = true;
});

async function removeBackground(file) {
  const base64 = await toBase64(file);
  const res = await fetch('/.netlify/functions/removebg', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageBase64: base64.split(',')[1], mimeType: file.type })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const bin = atob(data.imageBase64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: 'image/png' });
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// 목표 해상도 계산
function getTargetSize(w, h, sizeKey) {
  if (sizeKey === 'original') return { w, h };
  const targets = { '2k': 2048, '4k': 3840, 'print': 5000 };
  const maxPx = targets[sizeKey];
  const longer = Math.max(w, h);
  if (longer >= maxPx) return { w, h }; // 이미 충분히 크면 유지
  const ratio = maxPx / longer;
  return { w: Math.round(w * ratio), h: Math.round(h * ratio) };
}

// 다단계 업스케일 (Lanczos 근사 — 한 번에 2배씩 확대해서 품질 향상)
async function upscaleStep(srcCanvas, targetW, targetH) {
  let cur = srcCanvas;
  let cw = cur.width, ch = cur.height;

  while (cw < targetW * 0.5 || ch < targetH * 0.5) {
    const next = document.createElement('canvas');
    next.width = Math.min(cw * 2, targetW);
    next.height = Math.min(ch * 2, targetH);
    const ctx = next.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(cur, 0, 0, next.width, next.height);
    cur = next; cw = next.width; ch = next.height;
  }

  if (cw !== targetW || ch !== targetH) {
    const final = document.createElement('canvas');
    final.width = targetW; final.height = targetH;
    const ctx = final.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(cur, 0, 0, targetW, targetH);
    cur = final;
  }
  return cur;
}

function drawBg(ctx, w, h, style) {
  if (style === 'flat') {
    ctx.fillStyle = BG_MID; ctx.fillRect(0, 0, w, h);
  } else if (style === 'radial') {
    const rg = ctx.createRadialGradient(w/2, h*0.38, 0, w/2, h*0.38, Math.max(w,h)*0.72);
    rg.addColorStop(0, BG_LIGHT); rg.addColorStop(0.55, BG_MID); rg.addColorStop(1, BG_DARK);
    ctx.fillStyle = rg; ctx.fillRect(0, 0, w, h);
  } else {
    const lg = ctx.createLinearGradient(0, 0, w*0.5, h);
    lg.addColorStop(0, BG_LIGHT); lg.addColorStop(0.45, BG_MID); lg.addColorStop(1, BG_DARK);
    ctx.fillStyle = lg; ctx.fillRect(0, 0, w, h);
    const vg = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.28, w/2, h/2, Math.max(w,h)*0.72);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.055)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, w, h);
  }
}

async function composite(nukkiBlob, sizeKey, upMethod, quality, bgStyle) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(nukkiBlob);
    img.onload = async () => {
      URL.revokeObjectURL(url);
      const { w: dw, h: dh } = getTargetSize(img.naturalWidth, img.naturalHeight, sizeKey);

      // 누끼 이미지를 목표 해상도로 업스케일
      const srcCanvas = document.createElement('canvas');
      srcCanvas.width = img.naturalWidth; srcCanvas.height = img.naturalHeight;
      const srcCtx = srcCanvas.getContext('2d');
      srcCtx.drawImage(img, 0, 0);

      let upscaled;
      if (upMethod === 'lanczos' && (dw > img.naturalWidth || dh > img.naturalHeight)) {
        upscaled = await upscaleStep(srcCanvas, dw, dh);
      } else {
        upscaled = document.createElement('canvas');
        upscaled.width = dw; upscaled.height = dh;
        const uc = upscaled.getContext('2d');
        uc.imageSmoothingEnabled = true;
        uc.imageSmoothingQuality = 'high';
        uc.drawImage(srcCanvas, 0, 0, dw, dh);
      }

      // 배경 캔버스에 합성
      const outCanvas = document.createElement('canvas');
      outCanvas.width = dw; outCanvas.height = dh;
      const outCtx = outCanvas.getContext('2d');
      drawBg(outCtx, dw, dh, bgStyle);
      outCtx.drawImage(upscaled, 0, 0);

      outCanvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

$('runBtn').addEventListener('click', async () => {
  const valid = files.filter(Boolean);
  if (!valid.length) return;
  results = []; $('resultGrid').innerHTML = '';
  $('resultSection').style.display = 'none';
  $('progWrap').style.display = 'block';
  $('runBtn').disabled = true;

  const quality  = parseInt($('qualSlider').value) / 100;
  const bgStyle  = $('bgStyle').value;
  const sizeKey  = $('outputSize').value;
  const upMethod = $('upMethod').value;

  for (let i = 0; i < valid.length; i++) {
    const f = valid[i];
    $('statusMsg').textContent = `(${i+1}/${valid.length}) 누끼 처리 중: ${f.name}`;
    $('progBar').style.width = Math.round((i / valid.length) * 100) + '%';
    try {
      const nukki = await removeBackground(f);
      $('statusMsg').textContent = `(${i+1}/${valid.length}) 배경 합성 + 고해상도 처리 중: ${f.name}`;
      const out = await composite(nukki, sizeKey, upMethod, quality, bgStyle);
      const outUrl = URL.createObjectURL(out);
      const base = f.name.replace(/\.[^.]+$/, '');
      results.push({ url: outUrl, name: `${base}_studio.jpg`, blob: out, ok: true });
    } catch(err) {
      results.push({ url: null, name: f.name, blob: null, ok: false, err: err.message });
    }
    $('progBar').style.width = Math.round(((i+1) / valid.length) * 100) + '%';
  }

  const ok = results.filter(r => r.ok).length;
  $('statusMsg').textContent = `완료! ${ok}/${valid.length}개 성공`;
  $('runBtn').disabled = false;
  $('resultTitle').textContent = `처리 결과 (${ok}개)`;
  renderResults();
});

function renderResults() {
  $('resultGrid').innerHTML = '';
  results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'res-item';
    if (r.ok) {
      item.innerHTML = `<img src="${r.url}">`;
      const btn = document.createElement('button');
      btn.className = 'dl-btn';
      btn.textContent = `⬇ ${r.name}`;
      btn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = r.url;
        a.download = r.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
      item.appendChild(btn);
    } else {
      item.innerHTML = `<div style="height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#888;padding:8px;text-align:center;">${r.name}</div><div class="res-err">오류: ${r.err}</div>`;
    }
    $('resultGrid').appendChild(item);
  });
  $('resultSection').style.display = 'block';
}
</script>
</body>
</html>
